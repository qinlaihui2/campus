server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: campus-knowledge-assistant
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_assistant?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

  datasource-pg:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/campus_vector
    username: postgres
    password: postgres

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 默认 1 小时 (ms)
      cache-null-values: false

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 600MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: campus-knowledge-assistant-jwt-secret-key-2026-must-be-at-least-256-bits
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: campus-files

langchain4j:
  openai:
    api-key: sk-6188ec8d253044faa0b7c1e03511957a
    base-url: https://api.deepseek.com
    model-name: deepseek-chat
    streaming-chat-model:
      base-url: https://api.deepseek.com
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 4096

rag:
  chunk-size: 500
  chunk-overlap: 50
  top-k: 5
  similarity-threshold: 0.0

knife4j:
  enable: true
  setting:
    language: zh_cn
