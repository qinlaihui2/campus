version: '3.8'

services:
  # MySQL 业务数据库
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campus_assistant
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # PostgreSQL + pgvector 向量数据库
  postgres:
    image: pgvector/pgvector:pg16
    container_name: campus-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campus_vector
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: postgres -c shared_preload_libraries=vector

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: campus-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: campus-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: campus-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  # Spring Boot 后端
  campus-server:
    build:
      context: ../campus-server
      dockerfile: ../docker/Dockerfile
    container_name: campus-server
    restart: always
    depends_on:
      - mysql
      - postgres
      - redis
      - rabbitmq
      - minio
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/campus_assistant?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE-PG_URL: jdbc:postgresql://postgres:5432/campus_vector
      SPRING_DATASOURCE-PG_USERNAME: postgres
      SPRING_DATASOURCE-PG_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: http://minio:9000
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    ports:
      - "8080:8080"

  # Vue3 前端 + Nginx
  nginx:
    image: nginx:alpine
    container_name: campus-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../campus-web/dist:/usr/share/nginx/html:ro
    depends_on:
      - campus-server

volumes:
  mysql-data:
  postgres-data:
  redis-data:
  minio-data:
